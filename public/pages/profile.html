<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Your Profile</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body class="bg">
    <header>
      <nav class="navbar">
        <a class="logo" href="home.html">LabReserve.</a>

        <ul class="nav-links" id="navLinks">
          <li><a href="labs.html">Laboratories</a></li>
          <li><a href="reservation.html">Reserve</a></li>
          <li><a href="manage.html">Manage</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <h2>My Profile</h2>
      <p class="subtitle">View or update your account information.</p>

      <!-- hardcoded for now -->
      <div class="form-card">
        <form>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" value="John Doe"/>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" value="johndoe@dlsu.edu.ph"/>
          </div>

          <div class="form-group">
            <label>Username</label>
            <input type="text" value="john_doe"/>
          </div>

          <div class="form-group">
            <label>Role</label>
            <input type="text" value="Student" disabled/>
          </div>

          <div style="display:flex; gap:15px;">
            <button class="btn-cancel-modal">Save Changes</button>
            <button type="button" id="deleteAccountBtn" class="btn-confirm-modal">Delete Account</button>
          </div>
        </form>
      </div>
    </main>

    <script src="/js/script.js"></script>
  </body>
</html>
